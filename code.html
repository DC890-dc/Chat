<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Clone - Friends Chat</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
* { box-sizing: border-box; }

body { 
  background: #36393F; 
  color: #DCDDDE;
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

.discord-container {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 240px;
  background: #2F3136;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #202225;
  overflow-y: auto;
}

.server-icon {
  width: 50px;
  height: 50px;
  background: #5865F2;
  border-radius: 50%;
  margin: 10px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

.channels {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.channel {
  padding: 8px 12px;
  margin: 5px 0;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
  color: #B9BBBE;
}

.channel:hover {
  background: #47494F;
}

.channel.active {
  background: #404249;
  color: #FFF;
}

.main-chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #36393F;
}

.chat-header {
  height: 50px;
  background: #36393F;
  border-bottom: 1px solid #202225;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-weight: 600;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.message-group {
  display: flex;
  margin-bottom: 15px;
  gap: 12px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
  font-size: 14px;
  flex-shrink: 0;
}

.message-content {
  flex: 1;
}

.message-header {
  display: flex;
  gap: 8px;
  align-items: baseline;
  margin-bottom: 2px;
}

.username {
  font-weight: 600;
  color: #FFF;
  font-size: 14px;
}

.timestamp {
  font-size: 11px;
  color: #72767D;
  margin-left: 8px;
}

.message-text {
  color: #DCDDDE;
  font-size: 14px;
  word-wrap: break-word;
  line-height: 1.375;
}

.own-message .username {
  color: #7289DA;
}

.input-area {
  padding: 20px;
  background: #36393F;
}

.message-input-wrapper {
  display: flex;
  gap: 10px;
  background: #40444B;
  padding: 15px;
  border-radius: 8px;
  align-items: center;
}

#message {
  background: #40444B !important;
  color: #DCDDDE !important;
  border: none !important;
  flex: 1;
  font-size: 14px;
}

#message::placeholder {
  color: #72767D;
}

#message:focus {
  background: #40444B !important;
  color: #DCDDDE !important;
  box-shadow: none !important;
}

.send-btn {
  background: #5865F2;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}

.send-btn:hover {
  background: #4752C4;
}

.auth-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.auth-box {
  background: #36393F;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.3);
  max-width: 400px;
  width: 90%;
}

.auth-title {
  color: white;
  margin-bottom: 20px;
  font-size: 24px;
  font-weight: 700;
}

.auth-input {
  background: #40444B !important;
  color: #DCDDDE !important;
  border: 1px solid #202225 !important;
  padding: 10px 12px !important;
  margin-bottom: 15px !important;
  border-radius: 4px !important;
}

.auth-input::placeholder {
  color: #72767D;
}

.auth-button {
  background: #5865F2;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 4px;
  width: 100%;
  font-weight: 600;
  cursor: pointer;
}

.auth-button:hover {
  background: #4752C4;
}

.status-indicator {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #43B581;
  border-radius: 50%;
  margin-right: 6px;
}

::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: #202225;
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: #2F3136;
}
</style>
</head>

<body>

<div id="authModal" class="auth-modal">
  <div class="auth-box">
    <div class="auth-title">Discord Clone</div>
    <select class="form-select auth-input" id="sender">
      <option value="">Select your name</option>
      <option>Dev</option>
      <option>Alex</option>
      <option>Sam</option>
      <option>Jordan</option>
      <option>Sparsh</option>
      <option>Diddy</option>
      <option>Drake</option>
      <option>Fali</option>
      <option>John</option>
      <option>GoodBoi</option>
      <option>67</option>
      <option>HI</option>
      <option>89</option>
    </select>
    <input type="password" class="form-control auth-input" id="pin" placeholder="Enter PIN">
    <button class="auth-button" id="loginBtn">Login</button>
  </div>
</div>

<div id="chatApp" style="display:none;" class="discord-container">
  <div class="sidebar">
    <div class="server-icon">💬</div>
    <div class="channels">
      <div class="channel active" data-channel="general">
        <i class="bi bi-hash"></i> general
      </div>
      <div class="channel" data-channel="announcements">
        <i class="bi bi-megaphone"></i> announcements
      </div>
      <div class="channel" data-channel="off-topic">
        <i class="bi bi-chat-dots"></i> off-topic
      </div>
    </div>
    <div style="padding: 15px; border-top: 1px solid #202225; margin-top: auto;">
      <div style="color: #DCDDDE; font-size: 12px; margin-bottom: 8px;" id="currentUser"></div>
      <button id="logoutBtn" class="btn btn-sm btn-outline-danger" style="width: 100%;">Logout</button>
    </div>
  </div>

  <div class="main-chat">
    <div class="chat-header">
      <i class="bi bi-hash"></i> <span id="channelName">general</span>
    </div>
    <div class="chat-messages" id="chatBox"></div>
    <div class="input-area">
      <form id="chatForm">
        <div class="message-input-wrapper">
          <input type="text" class="form-control" id="message" placeholder="Message #general..." autocomplete="off">
          <button type="submit" class="send-btn" title="Send message"><i class="bi bi-send"></i></button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
/* USERS DATABASE */
const users = {
  Dev:{ pin:"18234567890", sub:true, color:"#7289DA" },
  Alex:{ pin:"2222", sub:true, color:"#43B581" },
  Sam:{ pin:"3333", sub:false, color:"#FAA61A" },
  Jordan:{ pin:"23234", sub:true, color:"#F26522" },
  Sparsh:{ pin:"8874", sub:true, color:"#EB459E" },
  Diddy:{ pin:"96964", sub:false, color:"#9C27B0" },
  Drake:{ pin:"7777", sub:true, color:"#00BCD4" },
  Fali:{ pin:"8888", sub:true, color:"#8BC34A" },
  John:{ pin:"9999", sub:true, color:"#FF9800" },
  GoodBoi:{ pin:"0000", sub:true, color:"#E91E63" },
  67:{ pin:"654782374578627865782645687668", sub:false, color:"#9C27B0" },
  HI:{ pin:"8375878357287858", sub:true, color:"#3F51B5" },
  89:{ pin:"82438728758278", sub:true, color:"#00CED1" }
};

let currentUser = null;
let currentChannel = "general";
let lastMessageCount = 0;
let pollInterval;

const authModal = document.getElementById("authModal");
const chatApp = document.getElementById("chatApp");
const chatBox = document.getElementById("chatBox");
const messageInput = document.getElementById("message");
const chatForm = document.getElementById("chatForm");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const senderSelect = document.getElementById("sender");
const pinInput = document.getElementById("pin");
const currentUserDiv = document.getElementById("currentUser");
const channelNameDisplay = document.getElementById("channelName");

/* SESSION MANAGEMENT */
function saveSession(username) {
  localStorage.setItem("currentSession", JSON.stringify({ user: username, timestamp: Date.now() }));
}

function loadSession() {
  const session = JSON.parse(localStorage.getItem("currentSession"));
  if (session && session.user && users[session.user]) {
    return session.user;
  }
  return null;
}

function clearSession() {
  localStorage.removeItem("currentSession");
}

/* PREVENT CODE INJECTION */
function sanitize(text){
  const div = document.createElement("div");
  div.innerText = text;
  return div.innerHTML;
}

/* GET USER COLOR */
function getUserColor(username) {
  return users[username]?.color || "#DCDDDE";
}

/* GET USER AVATAR */
function getUserAvatar(username) {
  return username.substring(0, 2).toUpperCase();
}

/* LOAD MESSAGES */
function loadMessages(){
  const messages = JSON.parse(localStorage.getItem("chatMessages")) || [];
  chatBox.innerHTML = "";

  // Filter messages by current channel
  const channelMessages = messages.filter(msg => msg.channel === currentChannel);
  
  let lastSender = null;
  
  channelMessages.forEach(msg => {
    const isMine = msg.sender === currentUser;
    
    // Create message group if sender changed
    if (msg.sender !== lastSender) {
      const group = document.createElement("div");
      group.className = `message-group ${isMine ? 'own-message' : ''}`;
      
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = getUserAvatar(msg.sender);
      avatar.style.background = `linear-gradient(135deg, ${getUserColor(msg.sender)} 0%, ${adjustColor(getUserColor(msg.sender), -20)} 100%)`;
      
      const content = document.createElement("div");
      content.className = "message-content";
      
      const header = document.createElement("div");
      header.className = "message-header";
      
      const username = document.createElement("span");
      username.className = "username";
      username.textContent = msg.sender;
      username.style.color = getUserColor(msg.sender);
      
      const timestamp = document.createElement("span");
      timestamp.className = "timestamp";
      timestamp.textContent = msg.time;
      
      header.appendChild(username);
      header.appendChild(timestamp);
      
      const text = document.createElement("div");
      text.className = "message-text";
      text.innerHTML = sanitize(msg.text);
      
      content.appendChild(header);
      content.appendChild(text);
      
      group.appendChild(avatar);
      group.appendChild(content);
      
      chatBox.appendChild(group);
      lastSender = msg.sender;
    } else {
      // Continue same message group
      const lastGroup = chatBox.lastChild;
      const text = document.createElement("div");
      text.className = "message-text";
      text.innerHTML = sanitize(msg.text);
      lastGroup.querySelector(".message-content").appendChild(text);
    }
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

/* LOGIN */
loginBtn.addEventListener("click", () => {
  const sender = senderSelect.value;
  const pin = pinInput.value;

  if(!sender || !pin){
    alert("All fields required.");
    return;
  }

  const user = users[sender];

  if(!user || user.pin !== pin){
    alert("Invalid credentials.");
    return;
  }

  if(!user.sub){
    alert("Subscription inactive.");
    return;
  }

  currentUser = sender;
  saveSession(sender);
  showChat();
});

/* LOGOUT */
logoutBtn.addEventListener("click", () => {
  currentUser = null;
  clearSession();
  stopPolling();
  authModal.style.display = "flex";
  chatApp.style.display = "none";
  senderSelect.value = "";
  pinInput.value = "";
  messageInput.value = "";
  senderSelect.focus();
});

/* SHOW CHAT AND START POLLING */
function showChat() {
  authModal.style.display = "none";
  chatApp.style.display = "flex";
  currentUserDiv.textContent = `Logged in as ${currentUser}`;
  messageInput.focus();
  loadMessages();
  startPolling();
}

/* POLLING FOR REAL-TIME UPDATES */
function startPolling() {
  loadMessages();
  pollInterval = setInterval(() => {
    const messages = JSON.parse(localStorage.getItem("chatMessages")) || [];
    const channelMessages = messages.filter(msg => msg.channel === currentChannel);
    
    // Check if new messages arrived
    if (channelMessages.length !== lastMessageCount) {
      lastMessageCount = channelMessages.length;
      loadMessages();
    }
  }, 500); // Update every 500ms
}

function stopPolling() {
  if (pollInterval) {
    clearInterval(pollInterval);
  }
  lastMessageCount = 0;
}

/* CHANNEL SWITCHING */
document.querySelectorAll(".channel").forEach(ch => {
  ch.addEventListener("click", (e) => {
    document.querySelectorAll(".channel").forEach(c => c.classList.remove("active"));
    ch.classList.add("active");
    currentChannel = ch.dataset.channel;
    channelNameDisplay.textContent = currentChannel;
    messageInput.placeholder = `Message #${currentChannel}...`;
    loadMessages();
  });
});

/* SEND MESSAGE */
chatForm.addEventListener("submit", e => {
  e.preventDefault();

  const text = messageInput.value.trim();

  if(!text){
    alert("Cannot send empty message.");
    return;
  }

  if(text.length > 2000){
    alert("Message too long (max 2000 characters).");
    return;
  }

  const messages = JSON.parse(localStorage.getItem("chatMessages")) || [];

  messages.push({
    sender: currentUser,
    text,
    time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
    channel: currentChannel
  });

  localStorage.setItem("chatMessages", JSON.stringify(messages));

  messageInput.value = "";
  loadMessages();
  messageInput.focus();
});

/* ENTER KEY SEND */
messageInput.addEventListener("keypress", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    chatForm.requestSubmit();
  }
});

/* HELPER: Adjust color brightness */
function adjustColor(color, percent) {
  const num = parseInt(color.replace("#",""), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.max(0, Math.min(255, (num >> 16) + amt));
  const G = Math.max(0, Math.min(255, (num >> 8 & 0x00FF) + amt));
  const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return "#" + (0x1000000 + (R<16?0:0)*16777216 + R*65536 + (G<16?0:0)*256 + G*256 + B).toString(16).slice(1);
}

/* AUTO-LOGIN & SYNC ACROSS TABS */
window.addEventListener("storage", (e) => {
  if (e.key === "chatMessages") {
    if (currentUser) {
      lastMessageCount = 0; // Force reload on storage change
    }
  }
});

/* INITIALIZE APP */
window.addEventListener("load", () => {
  const savedUser = loadSession();
  if (savedUser) {
    currentUser = savedUser;
    showChat();
  } else {
    senderSelect.focus();
  }
});
</script>

</body>
</html>
